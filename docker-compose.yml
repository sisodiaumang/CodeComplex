version: '3.8'

services:
  # MongoDB database
  mongodb:
    image: mongo:6.0
    container_name: devarena-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - devarena-network

  # Redis service
  redis:
    image: redis:7.0-alpine
    container_name: devarena-redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - devarena-network

  # Express Backend
  backend:
    build:
      context: ./backendServer
      dockerfile: Dockerfile
    container_name: devarena-backend
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - mongodb
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - PORT=8000
      - NODE_ENV=production
      - MONGODB_URI=${MONGODB_URI}
      - REDIS_URL=${REDIS_URL}
      - CLIENT_URL=${CLIENT_URL}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - ACCESS_TOKEN_EXPIRY=${ACCESS_TOKEN_EXPIRY:-15m}
      - REFRESH_TOKEN_EXPIRY=${REFRESH_TOKEN_EXPIRY:-7d}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
      - EMAIL_FROM_ADDRESS=${EMAIL_FROM_ADDRESS}
      - OWNER_EMAIL=${OWNER_EMAIL}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      # OAuth configurations
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - OAUTH_CALLBACK_URL=${OAUTH_CALLBACK_URL}
      # Cloudinary configurations
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - DEFAULT_AVATAR_URL=${DEFAULT_AVATAR_URL}
      - DEFAULT_AVATAR_PUBLIC_URL=${DEFAULT_AVATAR_PUBLIC_URL}
      - DEFAULT_AVATAR_PUBLIC_ID=${DEFAULT_AVATAR_PUBLIC_ID}
      # Judge0 / AI configurations
      - JUDGE_MODE=${JUDGE_MODE:-local}
      - JUDGE0_API_URL=${JUDGE0_API_URL:-http://localhost:2358}
      - JUDGE0_API_KEY=${JUDGE0_API_KEY}
      - JUDGE0_API_HOST=${JUDGE0_API_HOST}
      - XAI_API_KEY=${XAI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_API_KEYS=${GROQ_API_KEYS}
    networks:
      - devarena-network

  # Next.js Client
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_SOCKET_URL=${NEXT_PUBLIC_SOCKET_URL}
    container_name: devarena-frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - devarena-network

volumes:
  mongodb_data:

networks:
  devarena-network:
    driver: bridge
