version: '3.8'

services:
  # MongoDB database
  mongodb:
    image: mongo:6.0
    container_name: devarena-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - devarena-network

  # Redis service
  redis:
    image: redis:7.0-alpine
    container_name: devarena-redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - devarena-network

  # Express Backend
  backend:
    build:
      context: ./backendServer
      dockerfile: Dockerfile
    container_name: devarena-backend
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - mongodb
      - redis
    environment:
      - PORT=8000
      - NODE_ENV=production
      - MONGODB_URI=${MONGODB_URI}
      - REDIS_URL=${REDIS_URL}
      - CLIENT_URL=${CLIENT_URL}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
      - EMAIL_FROM_ADDRESS=${EMAIL_FROM_ADDRESS}
    networks:
      - devarena-network

  # Next.js Client
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_SOCKET_URL=${NEXT_PUBLIC_SOCKET_URL}
    container_name: devarena-frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - devarena-network

volumes:
  mongodb_data:

networks:
  devarena-network:
    driver: bridge
