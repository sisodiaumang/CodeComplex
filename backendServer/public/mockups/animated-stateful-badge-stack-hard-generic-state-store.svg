<svg xmlns='http://www.w3.org/2000/svg' width='400' height='300'>
  <rect x='50' y='20' width='300' height='260' fill='#B7D7CD'/>
  <rect x='100' y='50' width='200' height='200' fill='#C06C88'/>
  <rect x='150' y='150' width='100' height='100' fill='#B7D7CD'/>
  <rect x='250' y='50' width='100' height='100' fill='#C06C88'/>
  <rect x='300' y='150' width='100' height='100' fill='#B7D7CD'/>
  <rect x='50' y='150' width='100' height='100' fill='#C06C88'/>
  <g>
    <rect x='100' y='250' width='200' height='50' fill='#B7D7CD'/>
