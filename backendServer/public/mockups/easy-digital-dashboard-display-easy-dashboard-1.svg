<svg xmlns='http://www.w3.org/2000/svg' width='400' height='300'>
  <!-- Header & Date Section -->
  <rect x='10' y='10' width='380' height='40' rx='10' fill='#C06C88'/>
  <text x='20' y='30' font-size='24' fill='#B7D7CD'>Dashboard</text>
  <text x='20' y='60' font-size='18' fill='#B7D7CD'>Date: 2024-01-01</text>

  <!-- Time Card Section -->
  <rect x='10' y='70' width='100' height='50' rx='10' fill='#C06C88'/>
  <text x='20' y='90' font-size='24' fill='#B7D7CD'>12:00 PM</text>

  <!-- Temperature Gauge Section -->
  <rect x='120' y='70' width='100' height='50' rx='10' fill='#C06C88'/>
  <circle cx='140' cy='110' r='20' fill='#B7D7CD'/>
  <path d='M 140 90 L 180 60' stroke='#B7D7CD' stroke-width='2'/>
  <text x='140' y='120' font-size='18' fill='#B7D7CD'>25°C</text>

  <!-- Footer Section -->
  <rect x='10' y='230' width='380' height='40' rx='10' fill='#C06C88'/>
  <text x='20' y='250' font-size='18' fill='#B7D7CD'>Developed by DevWar Projects</text>
</svg>