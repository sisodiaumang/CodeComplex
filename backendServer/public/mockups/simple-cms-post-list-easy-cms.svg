<svg xmlns='http://www.w3.org/2000/svg' width='400' height='300'>
  <!-- Header -->
  <rect x='50' y='50' width='300' height='30' fill='#C06C88'/>
  <text x='65' y='75' font-size='20' font-weight='bold' fill='#B7D7CD'>Post List</text>
  <!-- Post List -->
  <rect x='50' y='100' width='300' height='200' fill='#411C56' rx='10'/>
  <rect x='60' y='110' width='280' height='20' fill='#B7D7CD' rx='10'/>
  <text x='70' y='130' fill='#B7D7CD' font-size='16'>Post 1</text>
  <text x='300' y='130' fill='#B7D7CD' font-size='16'>Edit</text>
  <text x='330' y='130' fill='#B7D7CD' font-size='16'>Delete</text>
  <!-- Add Post Button -->
  <rect x='50' y='250' width='150' height='30' fill='#411C56' rx='10'/>
